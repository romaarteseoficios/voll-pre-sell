<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - VOLL Plus</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="https://vollplus.com.br/wp-content/uploads/2024/05/logo_voll_pilates_institucional.png">
    
    <style>
        /* Reset para página standalone (GitHub Pages) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Inter', 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        .voll-presell-wrapper {
            background: url('https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&q=80') center/cover no-repeat;
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Camada escura por cima da imagem */
        .voll-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        /* O Modal / Cartão central */
        .voll-modal {
            background: #ffffff;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            padding: 45px 35px;
            text-align: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: vollPopIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes vollPopIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Logo ou Texto de Destaque */
        .voll-logo-text {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .voll-logo-text span {
            color: #00c853;
        }

        /* Badge de Atenção */
        .voll-alert-badge {
            background: #fff3cd;
            color: #856404;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .voll-title {
            font-size: 22px;
            line-height: 1.4;
            color: #222;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .voll-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Botão de Ação */
        .voll-btn {
            background: #00c853;
            color: #ffffff !important;
            display: block;
            width: 100%;
            padding: 18px 20px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none !important;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
            transition: all 0.3s ease;
            animation: vollPulse 2s infinite;
            cursor: pointer;
            box-sizing: border-box;
        }

        .voll-btn:hover {
            background: #00b34a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 200, 83, 0.6);
        }

        @keyframes vollPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(0, 200, 83, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
        }

        .voll-security {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="voll-presell-wrapper">
        <div class="voll-overlay"></div>
        <div class="voll-modal">
            <div class="voll-alert-badge">⚠️ Acesso Restrito</div>
            <div class="voll-logo-text">VOLL <span>Plus</span></div>
            <h2 class="voll-title">A maior plataforma de forma&ccedil;&atilde;o cont&iacute;nua em Pilates do Brasil.</h2>
            <p class="voll-desc">Para garantir que voc&ecirc; &eacute; um profissional ou estudante da &aacute;rea e liberar os planos com <strong>condi&ccedil;&otilde;es especiais</strong>, precisamos da sua confirma&ccedil;&atilde;o.</p>
            
            <a href="https://go.hotmart.com/S105873266K" target="_top" onclick="window.location.href='https://go.hotmart.com/S105873266K'; return false;" class="voll-btn">
                Sou Profissional/Estudante - Acessar
            </a>

            <div class="voll-security">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                P&aacute;gina 100% Segura e Oficial
            </div>
        </div>
    </div>
</body>
</html>
